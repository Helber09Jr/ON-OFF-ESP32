<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel IoT — UNJBG ESIS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-panel">

  <div class="header-inst">
    <div class="header-inst-izq">
      <img src="esis.png" alt="ESIS" class="logo-esis" onerror="this.style.display='none'">
      <div class="header-inst-texto">
        <span class="inst-siglas">UNJBG | FAING | ESIS</span>
        <span class="inst-titulo-completo">Sistema IoT de Control de Iluminacion</span>
      </div>
    </div>
    <span class="grupo-chip">Grupo 05</span>
  </div>

  <nav class="navbar">
    <div class="nav-links" id="nav-links">
      <a href="#" class="nav-link activo" onclick="cerrarMenu()">Inicio</a>
      <a href="#" class="nav-link" onclick="cerrarMenu()">Dispositivo</a>
      <a href="#" class="nav-link" onclick="cerrarMenu()">Proyecto</a>
      <a href="#" class="nav-link nav-salir" onclick="cerrarSesion(); return false;">Salir</a>
    </div>
    <span class="nav-usuario" id="email-usuario"></span>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <main>
    <div class="tarjeta" id="tarjeta">

      <h2>Control de Foco</h2>
      <p class="subtarjeta">Habitacion Principal</p>

      <div class="foco-contenedor" id="foco-contenedor">
        <svg id="foco-svg" viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="40" cy="38" rx="36" ry="36" class="foco-brillo"/>
          <path d="M40 6 C22 6 8 20 8 38 C8 53 17 65 28 71 L28 82 L52 82 L52 71 C63 65 72 53 72 38 C72 20 58 6 40 6 Z" class="foco-bola"/>
          <path d="M35 70 L35 60 Q40 54 45 60 L45 70" class="foco-filamento"/>
          <rect x="28" y="82" width="24" height="6" rx="2" class="foco-base"/>
          <rect x="30" y="88" width="20" height="6" rx="2" class="foco-base"/>
          <rect x="32" y="94" width="16" height="5" rx="2" class="foco-base"/>
        </svg>
      </div>

      <div class="estado-badge badge-off" id="estado-badge">
        <span id="texto-estado">APAGADO</span>
      </div>

      <button id="btn-toggle" class="btn-toggle btn-encender-mode" onclick="toggleFoco()">
        ENCENDER
      </button>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-inst">
      <span>UNJBG</span><span class="sep">|</span>
      <span>FAING</span><span class="sep">|</span>
      <span>ESIS</span>
    </div>
    <div class="footer-grupo">
      Grupo 05 &mdash; Helber Lopez &bull; Pablo Mamani &bull; Fernando Briceno
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/panel.js"></script>
</body>
</html>
