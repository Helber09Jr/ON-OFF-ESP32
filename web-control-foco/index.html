<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Iluminacion IoT</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-login">

  <div class="fondo-efectos">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="barrido barrido-1"></div>
    <div class="barrido barrido-2"></div>
  </div>

  <div class="contenedor-login">

    <div class="login-inst">
      <img src="esis.png" alt="ESIS" class="logo-esis-login" onerror="this.style.display='none'">
      <div class="login-inst-texto">
        <span class="inst-siglas">UNJBG | FAING | ESIS</span>
        <span class="inst-sub">Ing. en Informatica y Sistemas</span>
      </div>
    </div>

    <div class="login-divider"></div>

    <h1>Sistema IoT</h1>
    <p class="subtitulo">Control de Iluminacion</p>

    <div id="mensaje" class="mensaje oculto"></div>

    <div class="form-grupo">
      <label for="correo">Correo</label>
      <input type="email" id="correo" placeholder="correo@ejemplo.com" autocomplete="email">
    </div>

    <div class="form-grupo">
      <label for="clave">Contrasena</label>
      <input type="password" id="clave" placeholder="Contrasena" autocomplete="current-password">
    </div>

    <button class="btn-primary" onclick="iniciarSesion()">Iniciar Sesion</button>
    <button class="btn-secondary" onclick="crearCuenta()">Crear Cuenta</button>

    <p class="login-grupo">Grupo 05</p>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
